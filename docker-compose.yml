# FinSight Docker Compose
# Runs the Flask backend, nginx frontend, and local PostgreSQL on EC2.
#
# Usage:
#   cp .env.example .env   # fill in your values
#   docker-compose up -d --build
#   docker-compose logs -f

version: "3.9"

services:

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: finsight-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: finsight
      POSTGRES_USER: finsight_admin
      POSTGRES_PASSWORD: FinsightDB2024!
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - finsight-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsight_admin -d finsight"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask API Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # These can also live in .env — listed here for visibility
      - FLASK_ENV=production
      - FLASK_PORT=5000
      - TESSERACT_CMD=/usr/bin/tesseract
    volumes:
      # Mount a temp directory for OCR file processing
      - /tmp/finsight:/tmp/finsight
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - finsight-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Frontend (nginx) ────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: finsight-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - finsight-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  finsight-net:
    driver: bridge
